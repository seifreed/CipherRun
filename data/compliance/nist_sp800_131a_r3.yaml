id: nist-sp800-131a
name: NIST SP 800-131A Rev 3 Cryptographic Algorithm Transitions
version: "Rev3"
description: Enforces NIST SP 800-131A Rev 3 algorithm transition requirements for TLS endpoints
organization: NIST
effective_date: "2024-01-01"
requirements:
  - id: SP131A-1.1
    name: RSA Key Size Minimum 2048 bits
    description: RSA keys below 2048 bits are disallowed; 3072+ recommended post-2030
    category: Asymmetric Key Strength
    severity: critical
    remediation: "Replace certificate with RSA key size of at least 2048 bits (3072+ recommended)"
    rules:
      - type: CertificateKeySize
        min_rsa_bits: 2048

  - id: SP131A-1.2
    name: ECC Key Size Minimum 224 bits
    description: ECC keys below 224 bits are disallowed
    category: Asymmetric Key Strength
    severity: critical
    remediation: "Replace certificate with ECC key size of at least 224 bits (256+ recommended)"
    rules:
      - type: CertificateKeySize
        min_ecc_bits: 224

  - id: SP131A-2.1
    name: Prohibited — MD5 and SHA-1 in Digital Signatures
    description: MD5 and SHA-1 are prohibited for digital signatures per SP 800-131A Rev 3
    category: Hash Function / Signature Algorithm
    severity: critical
    remediation: "Reissue certificate using SHA-256 or stronger (SHA-384, SHA-512)"
    rules:
      - type: SignatureAlgorithm
        denied:
          - md5WithRSAEncryption
          - sha1WithRSAEncryption
          - ecdsa-with-SHA1
          - id-dsa-with-sha1

  - id: SP131A-3.1
    name: Prohibited — DES and 3DES (TDEA)
    description: DES (56-bit) and 3DES (112/168-bit) are disallowed for new applications
    category: Symmetric Encryption
    severity: critical
    remediation: "Remove DES and 3DES cipher suites; use AES-128-GCM minimum"
    rules:
      - type: CipherSuite
        denied_patterns:
          - ".*_DES_.*"
          - ".*3DES.*"
          - ".*DES_CBC.*"

  - id: SP131A-3.2
    name: Prohibited — RC4
    description: RC4 stream cipher is cryptographically broken and prohibited
    category: Symmetric Encryption
    severity: critical
    remediation: "Remove all RC4 cipher suites"
    rules:
      - type: CipherSuite
        denied_patterns:
          - ".*RC4.*"

  - id: SP131A-4.1
    name: TLS Protocol Version
    description: SSLv2, SSLv3, TLS 1.0, and TLS 1.1 are prohibited
    category: Protocol Version
    severity: critical
    remediation: "Disable SSLv2, SSLv3, TLS 1.0, and TLS 1.1; use TLS 1.2 or TLS 1.3 only"
    rules:
      - type: ProtocolVersion
        allowed:
          - "TLS 1.2"
          - "TLS 1.3"
        denied:
          - "SSLv2"
          - "SSLv3"
          - "TLS 1.0"
          - "TLS 1.1"

  - id: SP131A-5.1
    name: Certificate Must Be Valid and Unexpired
    description: Expired or untrusted certificates violate SP 800-131A operational requirements
    category: Certificate Validity
    severity: critical
    remediation: "Renew or replace the server certificate"
    rules:
      - type: CertificateValidation
        require_valid_chain: true
        require_unexpired: true
        require_hostname_match: true
